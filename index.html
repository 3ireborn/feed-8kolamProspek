═══════════════════════════════════════════════════════════════
🚀 NPA 8 KOLAM FEED GENERATOR V1.2
Special Project for 3iReborn & Nganggur Preneur Akademi
Tools: AI Image Prompt (4:5) & H-M-S-CTA Caption Builder
Update: Upload Button Fixed (JS Trigger) & Content Creator Style Prompt
═══════════════════════════════════════════════════════════════
-->

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 NPA 8 KOLAM FEED GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #0b1120; color: #f8fafc; }</style>
</head>
<body class="min-h-screen p-4 md:p-6 lg:p-8 flex flex-col">

    <div class="max-w-6xl mx-auto mb-8 text-center mt-4">
        <div class="inline-block px-4 py-1 rounded-full bg-emerald-900/50 border border-emerald-500 text-emerald-300 text-xs font-bold tracking-widest mb-3">SENJATA KONTEN 8 KOLAM</div>
        <h1 class="text-4xl md:text-5xl font-black uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-600 tracking-tight">FEED GENERATOR</h1>
    </div>

    <div class="max-w-6xl mx-auto grid lg:grid-cols-12 gap-8 flex-grow">
        
        <!-- PENGATURAN -->
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-6 shadow-2xl">
                
                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase block mb-2">🔑 1. API Key Gemini</label>
                    <input type="password" id="apiKey" placeholder="Paste API Key..." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none">
                </div>

                <div class="mb-5">
                    <label class="text-xs font-bold text-slate-400 uppercase block mb-2">📸 2. Foto Referensi Model</label>
                    <div class="border-2 border-dashed border-slate-700 rounded-2xl p-3 text-center bg-slate-800/50">
                        <img id="previewImage" src="https://placehold.co/400x500/1e293b/FFFFFF?text=FOTO+POTRAIT" class="w-32 h-40 object-cover mx-auto rounded-xl shadow-lg mb-3">
                        
                        <!-- JURUS UPLOAD PAKSA KLIK JAVASCRIPT (ANTI NGAMBEK) -->
                        <input id="photoUpload" type="file" accept="image/*" class="hidden" onchange="previewFoto(event)">
                        <button onclick="document.getElementById('photoUpload').click()" class="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3 text-sm font-bold shadow-lg shadow-blue-500/30 flex items-center justify-center transition-all mt-3">
                            <i class="fa-solid fa-camera mr-2"></i> Pilih Foto
                        </button>
                        
                    </div>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase block mb-2">🎯 3. Target 8 Kolam</label>
                    <select id="targetKolam" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none text-cyan-300 font-semibold">
                        <option value="Emak-Emak">Emak-Emak / Ibu Rumah Tangga</option>
                        <option value="Karyawan">Karyawan</option>
                        <option value="TKW / TKI">TKW / TKI</option>
                        <option value="Pedagang">Pedagang</option>
                        <option value="PNS">PNS</option>
                        <option value="Pengusaha">Pengusaha</option>
                        <option value="Mahasiswa">Mahasiswa</option>
                        <option value="Orang Tua Pusing Biaya Sekolah">Orang Tua (Biaya Sekolah)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase block mb-2">🎭 4. Ekspresi Gambar</label>
                    <select id="ekspresi" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none text-pink-400">
                        <option value="Sedih, pusing memegang kepala">😥 Sedih / Pusing Memikirkan Uang</option>
                        <option value="Takut, cemas melihat tagihan">😨 Takut / Cemas</option>
                        <option value="Gembira, antusias, tersenyum lebar">😃 Gembira / Antusias Menemukan Solusi</option>
                        <option value="Kecewa, menyesal, menghela napas">😞 Kecewa / Menyesal</option>
                        <option value="Berwibawa, profesional, senyum optimis">👔 Berwibawa / Otoritas</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase block mb-2">✍️ 5. Gaya Bahasa Caption</label>
                    <select id="styleCaption" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none text-yellow-400">
                        <option value="FOMO (Menakuti agar takut ketinggalan momen)">🔥 FOMO (Takut Ketinggalan)</option>
                        <option value="Kontra Pro (Melawan opini umum lalu memberikan solusi 3iReborn)">⚡ Kontra Pro (Nyentrik)</option>
                        <option value="Semangat / Motivasi tinggi menggebu-gebu">💪 Semangat / Motivasi</option>
                        <option value="Authority (Pakar yang memberikan edukasi tenang)">🎓 Authority (Edukasi Pakar)</option>
                    </select>
                </div>

                <button onclick="prosesGenerate()" id="btnGenerate" class="w-full mt-2 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:scale-[1.02] rounded-xl py-4 font-black text-lg shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all">
                    🚀 GENERATE KONTEN
                </button>
            </div>
        </div>

        <!-- HASIL OUTPUT -->
        <div class="lg:col-span-8 space-y-6">
            
            <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-cyan-400"><i class="fa-solid fa-image mr-2"></i> Prompt Gambar AI (Rasio 4:5)</h2>
                    <button onclick="copyTeks('outputPrompt')" class="bg-slate-800 hover:bg-slate-700 text-white text-xs px-4 py-2 rounded-lg font-bold">SALIN TEKS</button>
                </div>
                <textarea id="outputPrompt" rows="5" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm text-cyan-200 outline-none resize-none" readonly></textarea>
            </div>

            <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-6 shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-yellow-400"><i class="fa-solid fa-pen-nib mr-2"></i> Caption Feed (H-M-S-CTA-TAG)</h2>
                    <button onclick="copyTeks('outputCaption')" class="bg-slate-800 hover:bg-slate-700 text-white text-xs px-4 py-2 rounded-lg font-bold">SALIN TEKS</button>
                </div>
                <textarea id="outputCaption" rows="12" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm text-yellow-100 outline-none resize-none" readonly></textarea>
            </div>

        </div>
    </div>

    <!-- LOADING MODAL -->
    <div id="loadingModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(16,185,129,0.3)]">
            <div class="text-6xl animate-bounce mb-4">🤖</div>
            <h3 class="text-xl font-bold text-white mb-2">Meracik Konten...</h3>
            <p class="text-xs text-slate-400 mb-6">Menerapkan gaya Kreator Top & Pola H-M-S-CTA.</p>
            <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                <div class="bg-gradient-to-r from-emerald-500 to-cyan-400 h-2 rounded-full w-full animate-[pulse_1s_ease-in-out_infinite]"></div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            const savedKey = localStorage.getItem("npa_reels_api_key");
            if (savedKey) document.getElementById("apiKey").value = savedKey;
        };

        let globalBase64Image = "";
        function previewFoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImage').src = e.target.result;
                globalBase64Image = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }

        // MESIN COPY 100% MURNI ANTI GAGAL
        function copyTeks(id) { 
            var textToCopy = document.getElementById(id);
            if (!textToCopy || textToCopy.value.trim() === "") {
                alert("Belum ada teks yang bisa disalin, Komandan! 🫡");
                return;
            }
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy.value).then(function() {
                    alert("Berhasil disalin ke memori HP, Komandan! 🫡");
                }).catch(function() { fallbackCopyText(textToCopy); });
            } else { fallbackCopyText(textToCopy); }
        }
        function fallbackCopyText(textAreaElement) {
            textAreaElement.select();
            textAreaElement.setSelectionRange(0, 99999);
            try { document.execCommand('copy'); alert("Berhasil disalin ke memori HP, Komandan! 🫡"); } 
            catch (err) { alert("Waduh, HP menolak otomatis. Mohon copy manual! 🙏"); }
            window.getSelection().removeAllRanges();
        }

        async function prosesGenerate() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const target = document.getElementById('targetKolam').value;
            const ekspresi = document.getElementById('ekspresi').value;
            const gaya = document.getElementById('styleCaption').value;
            
            if (!apiKey || !globalBase64Image) {
                alert("Komandan! Pastikan API Key diisi dan Foto Referensi sudah di-upload! 🫡"); 
                return;
            }

            localStorage.setItem("npa_reels_api_key", apiKey);
            document.getElementById('loadingModal').classList.remove('hidden');
            document.getElementById('loadingModal').classList.add('flex');

            // ROMBAKAN PROMPT SUPER DEWA: MENGADOPSI GAYA BU NUR & FILOSOFI "GAMBAR YANG BICARA"
            const promptText = `Anda adalah Ahli Copywriting FB Pro & Desainer Thumbnail Profesional ala Content Creator Top.
            Analisa gambar referensi. Target prospek: ${target}. Gaya Copywriting: ${gaya}. Ekspresi Model: ${ekspresi}.
            
            PEGANG PRINSIP INI: "Biarkan Gambar yang bicara, kita yang closing di caption". 
            Gambar TIDAK BOLEH ramai teks brosur! Teks di gambar HANYA untuk HOOK super padat (Maksimal 3-5 KATA) yang memancing rasa penasaran audiens.

            BALAS HANYA DENGAN JSON VALID TANPA ARRAY/OBJECT DI DALAM VALUE (GUNAKAN \\n UNTUK ENTER).

            Format JSON:
            {
                "prompt": "Buatkan instruksi Prompt Gambar AI (Rasio 4:5). Subjek utama: ${target} (mirip foto referensi), berekspresi ${ekspresi}. Latar belakang bersih/aesthetic (clean background) menyisakan ruang kosong untuk teks. Di area kosong, letakkan teks tipografi 3D tebal dan sangat terbaca bertuliskan SATU KALIMAT HOOK (MAKSIMAL 3 HINGGA 5 KATA SAJA, contoh: 'Rahasia Tembus Target' atau 'Capek Gaji Numpang Lewat?'). Style ala kreator konten profesional. Bebas dari logo/watermark. Tulis sebagai 1 string.",
                "caption": "Buat Caption FB Feed Pola: HOOK (kalimat menohok penarik perhatian) -> MASALAH (rasa sakit/keresahan target secara emosional) -> SOLUSI (tawarkan NPA Smart System / 3iReborn secara logis) -> CTA (Arahkan audiens cek link di 'Pin Komentar', JANGAN gunakan kata Beli/Daftar/Klik Link) -> TAG (5 hashtag relevan). Tulis sebagai 1 string panjang."
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: promptText }, { inline_data: { mime_type: "image/jpeg", data: globalBase64Image } }] }],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    if (data.error.code === 429) {
                        throw new Error("Mesin sedang istirahat (Cool Down) karena Limit Gratisan! Tunggu sekitar 1 Menit lalu klik Generate lagi ya Ndan.");
                    } else {
                        throw new Error(data.error.message);
                    }
                }
                
                let rawText = data.candidates[0].content.parts[0].text.replace(/\`\`\`json/g, '').replace(/\`\`\`/g, '').trim();
                const resultJSON = JSON.parse(rawText);

                document.getElementById('outputPrompt').value = resultJSON.prompt;
                document.getElementById('outputCaption').value = resultJSON.caption;
                
            } catch (e) { alert("Error Ndan: " + e.message); } 
            finally { 
                document.getElementById('loadingModal').classList.remove('flex');
                document.getElementById('loadingModal').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
