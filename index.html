Update: Injected "Bu Nur Style" High-End Aesthetic Prompting

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 NPA 8 KOLAM MASTERPIECE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #0b1120; color: #f8fafc; }</style>
</head>
<body class="min-h-screen p-4 flex flex-col">

    <div class="max-w-4xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-black uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight">MASTERPIECE GENERATOR</h1>
    </div>

    <div class="max-w-4xl mx-auto bg-slate-900/80 p-6 rounded-3xl border border-slate-800 shadow-2xl">
        <div class="mb-4">
            <label class="text-xs font-bold text-slate-400 uppercase">🔑 API Key</label>
            <input type="password" id="apiKey" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 mt-1 outline-none">
        </div>
        
        <button onclick="prosesGenerate()" id="btnGenerate" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 font-black rounded-xl text-lg transition-all">🚀 GENERATE PROMPT MASTERPIECE</button>

        <div class="mt-8 space-y-4">
            <div>
                <label class="text-xs font-bold text-cyan-400 uppercase">PROMPT GAMBAR (Copy & Paste ke Bing/DALL-E):</label>
                <textarea id="outputPrompt" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm mt-1" readonly></textarea>
                <button onclick="copyTeksMaut('outputPrompt')" class="text-xs font-bold text-emerald-400 mt-1 hover:underline">SALIN TEKS</button>
            </div>
            <div>
                <label class="text-xs font-bold text-yellow-400 uppercase">CAPTION FB PROFESIONAL:</label>
                <textarea id="outputCaption" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm mt-1" readonly></textarea>
                <button onclick="copyTeksMaut('outputCaption')" class="text-xs font-bold text-emerald-400 mt-1 hover:underline">SALIN TEKS</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => { document.getElementById("apiKey").value = localStorage.getItem("npa_reels_api_key") || ""; };

        function copyTeksMaut(id) {
            var el = document.getElementById(id);
            el.removeAttribute('readonly');
            el.select();
            document.execCommand('copy');
            el.setAttribute('readonly', 'true');
            alert("Berhasil disalin, Komandan! 🫡");
        }

        async function prosesGenerate() {
            const apiKey = document.getElementById("apiKey").value;
            localStorage.setItem("npa_reels_api_key", apiKey);
            alert("Sedang meracik prompt masterpiece...");

            const prompt = `Anda adalah desainer visual expert FB Pro. Buatkan prompt AI image (Aspek Rasio 9:16) untuk FB Cover/Feed bertema 8 Kelompok Prospek (Emak, Karyawan, PNS, Pengusaha, Pedagang, TKW, Mahasiswa, Orang Tua Biaya Sekolah). 
            
            Gunakan gaya visual: Clean, hangat, elegan, aesthetic. Warna: cream, putih, beige, soft pastel. 
            Nuansa: Rumah nyaman, meja kerja, tanaman hijau, buku. 
            Komposisi: Foto di sisi kanan, ruang kosong di kiri/tengah untuk teks.
            Tambahkan instruksi visual untuk menaruh ikon/gambar kecil 8 kelompok prospek di bagian bawah gambar.
            
            DILARANG KERAS MENULIS TEKS/HURUF DI GAMBAR.
            
            Sertakan juga ide teks overlay (Hook) bergaya Authority: "Takut Gagal Setelah Wisuda?" atau "Kapan Gaji Mau Cukup?".
            
            Sertakan Caption FB: HOOK -> MASALAH -> SOLUSI (NPA Smart System) -> CTA (Arahkan ke Pin Komentar) -> TAGS.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const hasil = data.candidates[0].content.parts[0].text;
                document.getElementById('outputPrompt').value = hasil;
                document.getElementById('outputCaption').value = "Caption akan muncul di sini...";
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
